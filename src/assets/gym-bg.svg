<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <rect width="390" height="844" fill="#0a0a0c"/>
  <defs>
    <radialGradient id="red-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2b2b" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#c01818" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c01818" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="white-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f5f7" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f5f5f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- gym lighting -->
  <ellipse cx="40" cy="150" rx="300" ry="260" fill="url(#red-glow)"/>
  <ellipse cx="390" cy="760" rx="340" ry="300" fill="url(#red-glow)" opacity="0.7"/>
  <ellipse cx="340" cy="60" rx="230" ry="180" fill="url(#white-glow)"/>
  <ellipse cx="10" cy="620" rx="200" ry="170" fill="url(#white-glow)" opacity="0.6"/>

  <!-- blurred barbell resting on a rack, out-of-focus backdrop object -->
  <g filter="url(#soften)">
    <rect x="-30" y="472" width="450" height="12" rx="6" fill="#1f1f27"/>
    <rect x="52" y="420" width="30" height="116" rx="10" fill="#2a2a33"/>
    <rect x="90" y="438" width="18" height="80" rx="7" fill="#232329"/>
    <rect x="308" y="420" width="30" height="116" rx="10" fill="#2a2a33"/>
    <rect x="282" y="438" width="18" height="80" rx="7" fill="#232329"/>
    <rect x="30" y="536" width="14" height="180" rx="6" fill="#17171d"/>
    <rect x="346" y="536" width="14" height="180" rx="6" fill="#17171d"/>
    <!-- dumbbells on the floor, far background -->
    <rect x="150" y="700" width="90" height="10" rx="5" fill="#1c1c23"/>
    <circle cx="150" cy="705" r="22" fill="#20202a"/>
    <circle cx="240" cy="705" r="22" fill="#20202a"/>
  </g>

  <!-- floor sheen -->
  <ellipse cx="195" cy="844" rx="320" ry="120" fill="url(#red-glow)" opacity="0.35"/>
</svg>
